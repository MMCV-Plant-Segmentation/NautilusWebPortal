services:
  nwp:
    image: nautiluswebportal-nwp:latest
    ports:
      - "${PORT}:${PORT}"
    volumes:
      # nwp-data is mounted at /home/ubuntu/nwp inside the container (~/ = /home/ubuntu).
      # The SQLite database lives at /home/ubuntu/nwp/db.sqlite3 and persists across rebuilds.
      # To wipe the database: docker compose down -v && docker buildx bake && docker compose up
      - nwp-data:/home/ubuntu/nwp
    env_file: .env

volumes:
  nwp-data:
