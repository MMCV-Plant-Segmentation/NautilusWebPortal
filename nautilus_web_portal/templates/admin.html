{% extends "base.html" %}
{% block title %}Admin panel — NautilusWebPortal{% endblock %}

{% block content %}
<h2>Admin panel</h2>

<form id="create-form" style="display:flex; gap:0.5rem; align-items:center; margin-bottom:1.5rem;">
  <label for="new-username" style="white-space:nowrap; font-weight:bold;">New user:</label>
  <input type="text" id="new-username" placeholder="Username" required>
  <button type="submit">Create</button>
</form>

<table>
  <thead>
    <tr>
      <th>Username</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="user-tbody">
    <tr><td colspan="3">Loading…</td></tr>
  </tbody>
</table>
{% endblock %}

{% block scripts %}
<script>
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function timeRemaining(expires) {
    const secs = expires - Date.now() / 1000;
    if (secs <= 0) return 'expired';
    const days = Math.floor(secs / 86400);
    const hours = Math.floor((secs % 86400) / 3600);
    if (days > 0) return `${days}d ${hours}h`;
    return `${hours}h ${Math.floor((secs % 3600) / 60)}m`;
  }

  function buildRow(u) {
    const tr = document.createElement('tr');

    // Username
    const tdName = document.createElement('td');
    tdName.textContent = u.username;
    tr.appendChild(tdName);

    // Status
    const tdStatus = document.createElement('td');
    if (u.has_password) {
      tdStatus.textContent = 'Active';
    } else if (u.invite) {
      const url = window.location.origin + '/invite/' + u.invite.token;
      const label = document.createElement('div');
      label.textContent = `Invite pending — expires in ${timeRemaining(u.invite.expires)}`;
      const code = document.createElement('code');
      code.textContent = u.invite.token;
      code.style.cssText = 'display:block; word-break:break-all; margin:0.3rem 0;';
      const btnCode = document.createElement('button');
      btnCode.textContent = 'Copy code';
      btnCode.style.marginRight = '0.4rem';
      btnCode.addEventListener('click', () => {
        navigator.clipboard?.writeText(u.invite.token).catch(() => {});
        showMsg('Invite code copied!', 'success');
      });
      const btnLink = document.createElement('button');
      btnLink.textContent = 'Copy link';
      btnLink.addEventListener('click', () => {
        navigator.clipboard?.writeText(url).catch(() => {});
        showMsg('Invite link copied!', 'success');
      });
      tdStatus.appendChild(label);
      tdStatus.appendChild(code);
      tdStatus.appendChild(btnCode);
      tdStatus.appendChild(btnLink);
    } else {
      tdStatus.textContent = 'No invite';
    }
    tr.appendChild(tdStatus);

    // Actions (hidden for admin)
    const tdActions = document.createElement('td');
    if (u.username !== 'admin') {
      const resetBtn = document.createElement('button');
      resetBtn.textContent = 'Reset password';
      resetBtn.style.marginRight = '0.4rem';
      resetBtn.addEventListener('click', () => resetUser(u.id, u.username));
      tdActions.appendChild(resetBtn);

      const delBtn = document.createElement('button');
      delBtn.textContent = 'Delete';
      delBtn.className = 'danger';
      delBtn.addEventListener('click', () => deleteUser(u.id, u.username));
      tdActions.appendChild(delBtn);
    }
    tr.appendChild(tdActions);

    return tr;
  }

  async function loadUsers() {
    const res = await fetch('/api/users');
    if (!res.ok) { showMsg('Failed to load users.', 'error'); return; }
    const users = await res.json();
    const tbody = document.getElementById('user-tbody');
    tbody.innerHTML = '';
    users.forEach(u => tbody.appendChild(buildRow(u)));
  }

  async function createUser(e) {
    e.preventDefault();
    const input = document.getElementById('new-username');
    const username = input.value.trim();
    if (!username) return;
    const res = await fetch('/api/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username }),
    });
    const data = await res.json();
    if (!res.ok) { showMsg(data.error, 'error'); return; }
    input.value = '';
    showMsg(`User "${escHtml(username)}" created.`, 'success');
    loadUsers();
  }

  async function resetUser(id, username) {
    if (!confirm(`Reset ${username}'s password? Their current password will be revoked and a new invite link will be generated.`)) return;
    const res = await fetch(`/api/users/${id}/reset`, { method: 'POST' });
    const data = await res.json();
    if (!res.ok) { showMsg(data.error, 'error'); return; }
    showMsg('Password reset — new invite link generated.', 'success');
    loadUsers();
  }

  async function deleteUser(id, username) {
    if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;
    const res = await fetch(`/api/users/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok) { showMsg(data.error, 'error'); return; }
    showMsg(`User "${escHtml(username)}" deleted.`, 'success');
    loadUsers();
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadUsers();
    document.getElementById('create-form').addEventListener('submit', createUser);
  });
</script>
{% endblock %}
