{% extends "base.html" %}
{% block title %}Log in — NautilusWebPortal{% endblock %}

{% block content %}
<div style="max-width:360px; margin:4rem auto; background:#fff; padding:2rem; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
  <h2 style="margin-top:0;">Log in</h2>
  <form id="login-form">
    <div style="margin-bottom:0.8rem;">
      <label for="username">Username</label><br>
      <input type="text" id="username" name="username" required autofocus style="width:100%;">
    </div>
    <div style="margin-bottom:1rem;">
      <label for="password">Password</label><br>
      <input type="password" id="password" name="password" required style="width:100%;">
    </div>
    <div id="error" style="color:#c00; margin-bottom:0.8rem; min-height:1.2em;"></div>
    <button type="submit" style="width:100%;">Log in</button>
  </form>

  <hr style="margin:1.5rem 0; border:none; border-top:1px solid #ddd;">

  <p style="margin:0 0 0.6rem; font-weight:bold;">Have an invite code?</p>
  <form id="invite-form" style="display:flex; gap:0.5rem;">
    <input type="text" id="invite-code" placeholder="Paste code here" style="flex:1; min-width:0;">
    <button type="submit">Go</button>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    document.getElementById('error').textContent = '';
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) {
      document.getElementById('error').textContent = data.error;
    } else {
      window.location.href = '/';
    }
  });

  document.getElementById('invite-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const code = document.getElementById('invite-code').value.trim();
    if (code) window.location.href = '/invite/' + encodeURIComponent(code);
  });
</script>
{% endblock %}
